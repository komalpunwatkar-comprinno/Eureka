

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.server.webflux.routes[0].id=product-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/products/**,/api/v2/products/**

spring.cloud.gateway.server.webflux.routes[1].id=customer-v1
spring.cloud.gateway.server.webflux.routes[1].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/customers,/api/v1/customers/**

spring.cloud.gateway.server.webflux.routes[2].id=customer-v2
spring.cloud.gateway.server.webflux.routes[2].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v2/customers/**